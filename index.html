<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveRay</title>
  <meta name="description" content="Discover high-quality automobile accessories designed to enhance performance, comfort, and style. Purefront brings reliable products for car enthusiasts, everyday drivers, and businesses." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>

  <style>
    /* ─── CSS Variables ─────────────────────────────────────── */
    :root {
      --clr-bg:        #0a0a0a;
      --clr-surface:   #111111;
      --clr-card:      #161616;
      --clr-border:    #222222;
      --clr-accent:    #6C3BFF;
      --clr-accent2:   #f5a623;
      --clr-text:      #f0ede8;
      --clr-muted:     #888880;
      --clr-white:     #ffffff;
      --ff-display:    'Bebas Neue', sans-serif;
      --ff-condensed:  'Barlow Condensed', sans-serif;
      --ff-body:       'Barlow', sans-serif;
      --radius:        6px;
      --transition:    0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--clr-bg);
      color: var(--clr-text);
      font-family: var(--ff-body);
      font-weight: 400;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    ul { list-style: none; }

    /* ─── Noise Grain Overlay ───────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ─── Utility ────────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .accent { color: var(--clr-accent); }
    .tag {
      display: inline-block;
      font-family: var(--ff-condensed);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--clr-accent);
      border: 1px solid var(--clr-accent);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 18px;
    }
    .section-title {
      font-family: var(--ff-display);
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      letter-spacing: 2px;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .section-sub {
      color: var(--clr-muted);
      font-size: 1rem;
      max-width: 540px;
      line-height: 1.7;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ff-condensed);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: var(--radius);
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--clr-accent);
      color: #000;
    }
    .btn-primary:hover { background: var(--clr-accent2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,130,12,0.35); }
    .btn-outline {
      background: transparent;
      color: var(--clr-text);
      border: 1px solid var(--clr-border);
    }
    .btn-outline:hover { border-color: var(--clr-accent); color: var(--clr-accent); transform: translateY(-2px); }

    /* ─── Placeholder Image ──────────────────────────────────── */
    .img-placeholder {
      background: linear-gradient(135deg, #1a1a1a 0%, #222 60%, #1a1a1a 100%);
      border: 1px dashed #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #444;
      font-family: var(--ff-condensed);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }
    .img-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(232,130,12,0.04) 100%);
    }
    .img-placeholder svg { opacity: 0.3; }

    /* ─── Top Bar ─────────────────────────────────────────────── */
    .topbar {
      background: var(--clr-accent);
      color: #000;
      text-align: center;
      padding: 8px 24px;
      font-family: var(--ff-condensed);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ─── Nav ─────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--clr-border);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-img {
      width: 42px;
      height: 42px;
      border-radius: 4px;
      overflow: hidden;
    }
    .logo-text {
      font-family: var(--ff-display);
      font-size: 1.7rem;
      letter-spacing: 3px;
      color: var(--clr-white);
    }
    .logo-text span { color: var(--clr-accent); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links a {
      font-family: var(--ff-condensed);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--clr-muted);
      transition: color var(--transition);
    }
    .nav-links a:hover { color: var(--clr-accent); }
    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .nav-icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--clr-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .nav-icon-btn:hover { border-color: var(--clr-accent); color: var(--clr-accent); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--clr-text); }

    /* ─── Hero ────────────────────────────────────────────────── */
    .hero {
      min-height: 92vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -100px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(232,130,12,0.12) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 60px 80px 0;
      position: relative;
      z-index: 1;
    }
    .hero-eyebrow {
      font-family: var(--ff-condensed);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--clr-accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--clr-accent);
    }
    .hero-title {
      font-family: var(--ff-display);
      font-size: clamp(3.5rem, 7vw, 6.5rem);
      line-height: 0.95;
      letter-spacing: 2px;
      margin-bottom: 28px;
    }
    .hero-title em {
      font-style: normal;
      color: var(--clr-accent);
      display: block;
    }
    .hero-desc {
      color: var(--clr-muted);
      font-size: 1.05rem;
      max-width: 460px;
      margin-bottom: 40px;
      line-height: 1.75;
    }
    .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }
    .hero-stats {
      display: flex;
      gap: 40px;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid var(--clr-border);
    }
    .stat-num {
      font-family: var(--ff-display);
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: var(--clr-accent);
      line-height: 1;
    }
    .stat-label {
      font-family: var(--ff-condensed);
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--clr-muted);
      margin-top: 1px;
    }
    .hero-visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-img-main {
      width: 100%;
      height: 100%;
      min-height: 500px;
    }
    .hero-badge {
      position: absolute;
      bottom: 40px;
      left: 40px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-badge-icon {
      width: 40px;
      height: 40px;
      background: var(--clr-accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
    }
    .hero-badge-text {
      font-family: var(--ff-condensed);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--clr-muted);
    }
    .hero-badge-val {
      font-family: var(--ff-condensed);
      font-size: 16px;
      font-weight: 700;
      color: var(--clr-text);
      letter-spacing: 1px;
    }

    /* ─── Marquee ─────────────────────────────────────────────── */
    .marquee-wrap {
      background: var(--clr-accent);
      padding: 14px 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee-track {
      display: inline-flex;
      animation: marquee 28s linear infinite;
      gap: 0;
    }
    .marquee-item {
      font-family: var(--ff-display);
      font-size: 1rem;
      letter-spacing: 3px;
      color: #000;
      padding: 0 40px;
      display: inline-flex;
      align-items: center;
      gap: 16px;
    }
    .marquee-dot {
      width: 6px;
      height: 6px;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      flex-shrink: 0;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* ─── Features ────────────────────────────────────────────── */
    .features { padding: 100px 0; }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--clr-border);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 64px;
    }
    .feature-card {
      background: var(--clr-card);
      padding: 40px 32px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .feature-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--clr-accent);
      transform: scaleX(0);
      transition: transform var(--transition);
    }
    .feature-card:hover { background: #1a1a1a; }
    .feature-card:hover::before { transform: scaleX(1); }
    .feature-emoji {
      font-size: 2rem;
      margin-bottom: 20px;
      display: block;
    }
    .feature-name {
      font-family: var(--ff-condensed);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--clr-text);
      margin-bottom: 12px;
    }
    .feature-desc {
      font-size: 0.9rem;
      color: var(--clr-muted);
      line-height: 1.65;
    }

    /* ─── Products ────────────────────────────────────────────── */
    .products { padding: 100px 0; background: var(--clr-surface); }
    .products-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 56px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .product-card {
      background: var(--clr-card);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
    }
    .product-card:hover { border-color: var(--clr-accent); transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .product-img {
      height: 220px;
      position: relative;
    }
    .product-badge-tag {
      position: absolute;
      top: 14px;
      left: 14px;
      background: var(--clr-accent);
      color: #000;
      font-family: var(--ff-condensed);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
    }
    .product-body { padding: 22px; }
    .product-cat {
      font-family: var(--ff-condensed);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--clr-accent);
      margin-bottom: 8px;
    }
    .product-name {
      font-family: var(--ff-condensed);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--clr-text);
      margin-bottom: 8px;
    }
    .product-desc {
      font-size: 0.85rem;
      color: var(--clr-muted);
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-price {
      font-family: var(--ff-display);
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--clr-accent);
    }
    .product-price small {
      font-family: var(--ff-body);
      font-size: 0.7rem;
      color: var(--clr-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
    }
    .product-btn {
      width: 38px;
      height: 38px;
      background: var(--clr-accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      transition: var(--transition);
      border: none;
      cursor: pointer;
    }
    .product-btn:hover { background: var(--clr-accent2); transform: scale(1.1); }

    /* ─── Promo Banner ────────────────────────────────────────── */
    .promo { padding: 80px 0; }
    .promo-inner {
      background: linear-gradient(135deg, #1a1500 0%, #0d0d0d 40%, #111 100%);
      border: 1px solid #2a2000;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      position: relative;
    }
    .promo-inner::before {
      content: '';
      position: absolute;
      top: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,130,12,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .promo-content { padding: 64px 56px; position: relative; z-index: 1; }
    .promo-title {
      font-family: var(--ff-display);
      font-size: clamp(2.5rem, 4vw, 3.8rem);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 20px;
    }
    .promo-desc { color: var(--clr-muted); font-size: 0.95rem; max-width: 400px; margin-bottom: 36px; line-height: 1.7; }
    .promo-img { position: relative; min-height: 320px; }

    /* ─── Categories ──────────────────────────────────────────── */
    .categories { padding: 100px 0; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: auto auto;
      gap: 20px;
      margin-top: 56px;
    }
    .cat-card {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: var(--transition);
    }
    .cat-card:hover { transform: translateY(-3px); box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
    .cat-card:first-child { grid-row: 1 / 3; }
    .cat-img { height: 100%; min-height: 240px; }
    .cat-card:first-child .cat-img { min-height: 520px; }
    .cat-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
      transition: var(--transition);
    }
    .cat-card:hover .cat-overlay { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(232,130,12,0.15) 100%); }
    .cat-name {
      font-family: var(--ff-display);
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 6px;
    }
    .cat-count {
      font-family: var(--ff-condensed);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--clr-accent);
    }
    .cat-arrow {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin-top: 16px;
      transition: var(--transition);
    }
    .cat-card:hover .cat-arrow { background: var(--clr-accent); border-color: var(--clr-accent); color: #000; }

    /* ─── About ───────────────────────────────────────────────── */
    .about { padding: 100px 0; background: var(--clr-surface); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .about-img-wrap { position: relative; }
    .about-img { width: 100%; height: 480px; border-radius: var(--radius); }
    .about-img-badge {
      position: absolute;
      top: -20px;
      right: -20px;
      width: 120px;
      height: 120px;
      background: var(--clr-accent);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #000;
    }
    .about-badge-num {
      font-family: var(--ff-display);
      font-size: 2rem;
      letter-spacing: 1px;
      line-height: 1;
    }
    .about-badge-lbl {
      font-family: var(--ff-condensed);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
      max-width: 70px;
    }
    .about-content { }
    .about-body { color: var(--clr-muted); font-size: 0.95rem; line-height: 1.8; margin-bottom: 16px; }
    .about-list { margin: 28px 0; display: flex; flex-direction: column; gap: 14px; }
    .about-list-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      font-size: 0.9rem;
      color: var(--clr-muted);
    }
    .about-list-icon {
      width: 22px;
      height: 22px;
      background: rgba(232,130,12,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--clr-accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ─── B2B Section ─────────────────────────────────────────── */
    .b2b { padding: 100px 0; }
    .b2b-inner {
      background: var(--clr-card);
      border: 1px solid var(--clr-border);
      border-radius: 10px;
      padding: 64px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .b2b-cards { display: flex; flex-direction: column; gap: 16px; }
    .b2b-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      transition: var(--transition);
    }
    .b2b-card:hover { border-color: var(--clr-accent); }
    .b2b-icon {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      background: rgba(232,130,12,0.1);
      border: 1px solid rgba(232,130,12,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--clr-accent);
      flex-shrink: 0;
    }
    .b2b-card-title {
      font-family: var(--ff-condensed);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--clr-text);
      margin-bottom: 6px;
    }
    .b2b-card-desc { font-size: 0.85rem; color: var(--clr-muted); line-height: 1.6; }
    .b2b-note {
      margin-top: 20px;
      padding: 16px 20px;
      background: rgba(232,130,12,0.06);
      border-left: 3px solid var(--clr-accent);
      border-radius: 0 4px 4px 0;
      font-size: 0.85rem;
      color: var(--clr-muted);
      font-style: italic;
    }
    .b2b-note strong { color: var(--clr-accent); font-style: normal; }

    /* ─── Contact / Inquiry ───────────────────────────────────── */
    .inquiry { padding: 100px 0; background: var(--clr-surface); }
    .inquiry-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .inquiry-info { }
    .contact-items { margin-top: 36px; display: flex; flex-direction: column; gap: 18px; }
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .contact-icon {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--clr-border);
      background: var(--clr-card);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--clr-accent);
      flex-shrink: 0;
    }
    .contact-label {
      font-family: var(--ff-condensed);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--clr-muted);
      margin-bottom: 2px;
    }
    .contact-val {
      font-size: 0.9rem;
      color: var(--clr-text);
      word-break: break-all;
    }
    .inquiry-form { }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-family: var(--ff-condensed);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--clr-muted);
      margin-bottom: 8px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--clr-card);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--clr-text);
      font-family: var(--ff-body);
      font-size: 0.9rem;
      transition: var(--transition);
      outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--clr-accent);
      box-shadow: 0 0 0 3px rgba(232,130,12,0.1);
    }
    .form-select { appearance: none; cursor: pointer; }
    .form-textarea { min-height: 120px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ─── Social Strip ────────────────────────────────────────── */
    .social-strip { padding: 60px 0; border-top: 1px solid var(--clr-border); border-bottom: 1px solid var(--clr-border); }
    .social-strip-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
    }
    .social-label {
      font-family: var(--ff-condensed);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--clr-muted);
    }
    .social-icons { display: flex; gap: 10px; flex-wrap: wrap; }
    .social-icon {
      width: 42px;
      height: 42px;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--clr-muted);
      font-family: var(--ff-condensed);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
    }
    .social-icon:hover { border-color: var(--clr-accent); color: var(--clr-accent); background: rgba(232,130,12,0.05); }

    /* ─── Newsletter ──────────────────────────────────────────── */
    .newsletter { padding: 80px 0; }
    .newsletter-inner {
      background: linear-gradient(135deg, #111 0%, #1a1400 100%);
      border: 1px solid #2a2000;
      border-radius: 10px;
      padding: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }
    .newsletter-text { max-width: 480px; }
    .newsletter-form { display: flex; gap: 12px; flex-wrap: wrap; }
    .nl-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 13px 20px;
      color: var(--clr-text);
      font-family: var(--ff-body);
      font-size: 0.9rem;
      outline: none;
      width: 280px;
      transition: var(--transition);
    }
    .nl-input::placeholder { color: var(--clr-muted); }
    .nl-input:focus { border-color: var(--clr-accent); }

    /* ─── Footer ──────────────────────────────────────────────── */
    .footer { background: var(--clr-surface); border-top: 1px solid var(--clr-border); padding: 72px 0 0; }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 60px;
    }
    .footer-brand { }
    .footer-logo {
      font-family: var(--ff-display);
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--clr-white);
      margin-bottom: 16px;
    }
    .footer-logo span { color: var(--clr-accent); }
    .footer-tagline {
      font-size: 0.85rem;
      color: var(--clr-muted);
      font-style: italic;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .footer-legal {
      font-family: var(--ff-condensed);
      font-size: 10px;
      letter-spacing: 1px;
      color: #444;
      text-transform: uppercase;
    }
    .footer-col-title {
      font-family: var(--ff-condensed);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--clr-text);
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--clr-border);
    }
    .footer-links { display: flex; flex-direction: column; gap: 12px; }
    .footer-links a {
      font-size: 0.875rem;
      color: var(--clr-muted);
      transition: color var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer-links a:hover { color: var(--clr-accent); }
    .footer-links a::before { content: '—'; opacity: 0.3; font-size: 0.75rem; }
    .footer-bottom {
      border-top: 1px solid var(--clr-border);
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-copy {
      font-size: 0.8rem;
      color: var(--clr-muted);
    }
    .footer-bottom-links {
      display: flex;
      gap: 24px;
    }
    .footer-bottom-links a {
      font-family: var(--ff-condensed);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--clr-muted);
      transition: color var(--transition);
    }
    .footer-bottom-links a:hover { color: var(--clr-accent); }

    /* ─── Animations ──────────────────────────────────────────── */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ─── Responsive ──────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .features-grid { grid-template-columns: repeat(2, 1fr); }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .hero { grid-template-columns: 1fr; }
      .hero-visual { display: none; }
      .hero-content { padding: 60px 0; }
      .about-grid { grid-template-columns: 1fr; }
      .b2b-inner { grid-template-columns: 1fr; }
      .inquiry-inner { grid-template-columns: 1fr; }
      .promo-inner { grid-template-columns: 1fr; }
      .promo-img { display: none; }
      .cat-grid { grid-template-columns: 1fr; }
      .cat-card:first-child { grid-row: auto; }
      .footer-grid { grid-template-columns: 1fr; }
      .newsletter-inner { flex-direction: column; }
      .newsletter-form { flex-direction: column; }
      .nl-input { width: 100%; }
      .hero-stats { flex-wrap: wrap; gap: 24px; }
      .form-row { grid-template-columns: 1fr; }
      .b2b-inner { padding: 32px; }
      .promo-content { padding: 40px 32px; }
    }

    /* ─── Mobile Nav Menu ─────────────────────────────────────── */
    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.98);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: var(--ff-display);
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: var(--clr-text);
      transition: color var(--transition);
    }
    .mobile-menu a:hover { color: var(--clr-accent); }
    .mobile-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      color: var(--clr-text);
      cursor: pointer;
    }
  </style>
</head>
